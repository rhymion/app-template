$schema: "http://json-schema.org/draft-07/schema#"

# Support multi-tenancy
format-version: 1.0

x-receiving:
  roles:
    purchase_order: receiving_purchase_order
    asn: receiving_asn
    receipt: receiving_receipt
  policy:
    allowDirectReceipt: true
    allowReceiptFromAsn: true
    allowReceiptFromPurchaseOrder: true
    inventoryMutation: confirm_receipt

definitions:
  # ============================================================
  # System entities (required by all apps — see §1.1)
  # Keep these definitions intact when creating a new app.
  # ============================================================

  user:
    type: object
    required:
      - id
      - name
      - email
    x-display:
      table:
        - name:
            primary: true
            width: 150
        - additional_info:
            width: 250
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      name:
        type: string
        minLength: 1
      email:
        type: string
      # Nullable so SSO-provisioned users (Google, etc.) can exist without a
      # bcrypt hash. Credentials sign-in still requires a non-null password —
      # auth.ts authorize() rejects accounts with password === null.
      password:
        type:
          - string
          - "null"
        x-custom-component:
          target:
            - upsert
      api_key:
        type:
          - string
          - "null"
        x-custom-component:
          target:
            - upsert
      image:
        type:
          - string
          - "null"
        format: uri
      mfa_enabled:
        type: boolean
        default: false
        x-custom-component:
          target:
            - upsert

  role:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      name:
        type: string
        minLength: 1
      description:
        type:
          - string
          - "null"

  user_detail:
    x-generate:
      list: true
      view: true
      new: false
      edit: true
      delete: true
      invalidate: false
      api: true
      test: true
      fields:
        - name
        - image
        - roles
    x-custom-components:
      - name: MfaToggle
        path: "@/components/_standard/MfaToggle"
        target:
          - view
    x-relationships:
      roles:
        type: many-to-many
        target: role
    allOf:
      - $ref: "#/definitions/user"
      - type: object
        required:
          - roles
        properties:
          roles:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/role"

  setting:
    x-generate:
      list: false
      view: true
      new: false
      edit: true
      delete: false
      invalidate: false
      api: true
      fields:
        - name
        - email
        - image
        - password
        - api_key
        - mfa_enabled
    x-relationships:
      roles:
        type: many-to-many
        target: role
    allOf:
      - $ref: "#/definitions/user"
      - type: object
        required:
          - roles
        properties:
          roles:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/role"

  role_detail:
    x-generate:
      list: true
      view: true
      new: true
      edit: true
      delete: true
      invalidate: false
      api: true
      test: true
    # Security-sensitive entity: every create/update/delete is recorded in
    # the audit_log table by the generated service layer.
    x-audit: true
    x-relationships:
      users:
        type: many-to-many
        target: user
    allOf:
      - $ref: "#/definitions/role"
      - type: object
        required:
          - users
        properties:
          users:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/user"

  organization:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      name:
        type: string
        minLength: 1
      description:
        type:
          - string
          - "null"

  organization_detail:
    x-generate:
      list: true
      view: true
      new: true
      edit: true
      delete: true
      invalidate: false
      api: true
      test: true
    x-relationships:
      users:
        type: many-to-many
        target: user
    allOf:
      - $ref: "#/definitions/organization"
      - type: object
        required:
          - users
        properties:
          users:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/user"

  permission:
    type: object
    required:
      - id
      - name
      - create
      - read
      - update
      - delete
    x-display:
      table:
        - name:
            width: 200
        - role:
            width: 200
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      name:
        type: string
        minLength: 1
        x-entity-select: true
      create:
        type: boolean
      read:
        type: boolean
      update:
        type: boolean
      delete:
        type: boolean
      role_id:
        type:
          - string
          - "null"
        pattern: "^c[a-z0-9]{24,}$"
        x-relationship:
          type: many-to-one
          target: role
          labelField: name

  permission_detail:
    x-generate:
      list: true
      view: true
      new: true
      edit: true
      delete: true
      invalidate: false
      api: true
      test: true
    # Security-sensitive entity: every create/update/delete is recorded in
    # the audit_log table by the generated service layer.
    x-audit: true
    allOf:
      - $ref: "#/definitions/permission"
      - type: object
        properties:
          role:
            $ref: "#/definitions/role"

  approval_flow:
    type: object
    required:
      - id
      - entity_name
      - approver_role_id
    x-display:
      table:
        - entity_name:
            primary: true
            width: 200
        - requestor_role:
