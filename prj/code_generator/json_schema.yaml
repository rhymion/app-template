$schema: "http://json-schema.org/draft-07/schema#"

# Support multi-tenancy
format-version: 1.0
definitions:
  # ============================================================
  # System entities (required by all apps — see §1.1)
  # Keep these definitions intact when creating a new app.
  # ============================================================

  user:
    type: object
    required:
      - id
      - name
      - email
    x-display:
      table:
        - name:
            primary: true
            width: 150
        - additional_info:
            width: 250
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      name:
        type: string
        minLength: 1
      email:
        type: string
      password:
        type: 
          - string
          - "null"
        x-custom-component:
          target:
            - upsert
      api_key:
        type:
          - string
          - "null"
        x-custom-component:
          target:
            - upsert
      image:
        type:
          - string
          - "null"
        format: uri
      mfa_enabled:
        type: boolean
        default: false
        x-custom-component:
          target:
            - upsert

  role:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      name:
        type: string
        minLength: 1
      description:
        type:
          - string
          - "null"

  user_detail:
    x-generate:
      list: true
      view: true
      new: false
      edit: true
      delete: true
      invalidate: false
      api: true
      test: true
      fields:
        - name
        - image
        - roles
    x-custom-components:
      - name: MfaToggle
        path: "@/components/_standard/MfaToggle"
        target:
          - view
    x-relationships:
      roles:
        type: many-to-many
        target: role
    allOf:
      - $ref: "#/definitions/user"
      - type: object
        required:
          - roles
        properties:
          roles:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/role"

  setting:
    x-generate:
      list: false
      view: true
      new: false
      edit: true
      delete: false
      invalidate: false
      api: true
      fields:
        - name
        - email
        - image
        - password
        - api_key
        - mfa_enabled
    x-relationships:
      roles:
        type: many-to-many
        target: role
    allOf:
      - $ref: "#/definitions/user"
      - type: object
        required:
          - roles
        properties:
          roles:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/role"

  role_detail:
    x-generate:
      list: true
      view: true
      new: true
      edit: true
      delete: true
      invalidate: false
      api: true
      test: true
    # Security-sensitive entity: every create/update/delete is recorded in
    # the audit_log table by the generated service layer.
    x-audit: true
    x-relationships:
      users:
        type: many-to-many
        target: user
    allOf:
      - $ref: "#/definitions/role"
      - type: object
        required:
          - users
        properties:
          users:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/user"

  organization:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      name:
        type: string
        minLength: 1
      description:
        type:
          - string
          - "null"

  organization_detail:
    x-generate:
      list: true
      view: true
      new: true
      edit: true
      delete: true
      invalidate: false
      api: true
      test: true
    x-relationships:
      users:
        type: many-to-many
        target: user
    allOf:
      - $ref: "#/definitions/organization"
      - type: object
        required:
          - users
        properties:
          users:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/user"

  permission:
    type: object
    required:
      - id
      - name
      - create
      - read
      - update
      - delete
    x-display:
      table:
        - name:
            width: 200
        - role:
            width: 200
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      name:
        type: string
        minLength: 1
        x-entity-select: true
      create:
        type: boolean
      read:
        type: boolean
      update:
        type: boolean
      delete:
        type: boolean
      role_id:
        type:
          - string
          - "null"
        pattern: "^c[a-z0-9]{24,}$"
        x-relationship:
          type: many-to-one
          target: role
          labelField: name

  permission_detail:
    x-generate:
      list: true
      view: true
      new: true
      edit: true
      delete: true
      invalidate: false
      api: true
      test: true
    # Security-sensitive entity: every create/update/delete is recorded in
    # the audit_log table by the generated service layer.
    x-audit: true
    allOf:
      - $ref: "#/definitions/permission"
      - type: object
        properties:
          role:
            $ref: "#/definitions/role"

  approval_flow:
    type: object
    required:
      - id
      - entity_name
      - approver_role_id
    x-display:
      table:
        - entity_name:
            primary: true
            width: 200
        - requestor_role:
            width: 150
        - approver_role:
            width: 150
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      entity_name:
        type: string
        minLength: 1
        x-entity-select: true
      requestor_role_id:
        type: 
          - string
          - "null"
        pattern: "^c[a-z0-9]{24,}$"
        x-relationship:
          type: many-to-one
          target: role
          labelField: name
      approver_role_id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
        x-relationship:
          type: many-to-one
          target: role
          labelField: name

  approval_flow_detail:
    x-generate:
      list: true
      view: true
      new: true
      edit: true
      delete: true
      invalidate: false
      api: true
      test: true
    x-relationships:
      preceded_by:
        type: many-to-many
        target: approval_flow
        labelField: entity_name
        secondaryLabelField: approver_role.name
      followed_by:
        type: many-to-many
        target: approval_flow
        labelField: entity_name
        secondaryLabelField: approver_role.name
    allOf:
      - $ref: "#/definitions/approval_flow"
      - type: object
        required:
          - approver_role
          - preceding_transitions
        properties:
          requestor_role:
            $ref: "#/definitions/role"
          approver_role:
            $ref: "#/definitions/role"
          preceded_by:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/approval_flow"
          followed_by:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/approval_flow"

  approval_request:
    type: object
    required:
      - id
      - approvable_id
      - approval_flow_id
    x-display:
      table:
        - approval_flow:
            width: 200
        - status:
            width: 100
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      approvable_id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
        x-relationship:
          type: many-to-one
          target: approvable
          labelField: id
      approval_flow_id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
        x-relationship:
          type: many-to-one
          target: approval_flow
          labelField: entity_name
      status:
        type: integer
        minimum: 0
        maximum: 2
        enum:
          - Pending
          - Approved
          - Rejected

  approvable:
    type: object
    required:
      - id
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"

  approvable_detail:
    x-generate:
      list: false
      view: false
      new: false
      edit: false
      delete: false
      invalidate: false
      api: false
      test: false
    allOf:
      - $ref: "#/definitions/approvable"
      - type: object
        required:
          - approval_requests
        properties:
          approval_requests:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/approval_request"

  commentable:
    type: object
    required:
      - id
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"

  commentable_detail:
    x-generate:
      list: false
      view: false
      new: false
      edit: false
      delete: false
      invalidate: false
      api: false
      test: false
    allOf:
      - $ref: "#/definitions/commentable"
      - type: object
        required:
          - comments
        properties:
          comments:
            type: array
            x-outputType: comments
            items:
              $ref: "#/definitions/comment"

  comment:
    type: object
    required:
      - id
      - message
      - commentable_id
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      message:
        type: string
        minLength: 1
      commentable_id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"

  attachable:
    type: object
    required:
      - id
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"

  attachable_detail:
    x-generate:
      list: false
      view: false
      new: false
      edit: false
      delete: false
      invalidate: false
      api: false
      test: false
    allOf:
      - $ref: "#/definitions/attachable"
      - type: object
        required:
          - attachments
        properties:
          attachments:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/attachment"
          resource:
            $ref: "#/definitions/resource"
          product:
            $ref: "#/definitions/product"

  attachment:
    type: object
    required:
      - id
      - type
      - name
      - path
      - attachable_id
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      type:
        type: integer
        minimum: 0
        maximum: 3
        enum:
          - image
          - file
          - video
          - audio
      order:
        type: integer
        default: 0
      name:
        type: string
        minLength: 1
      path:
        type: string
        format: uri
      attachable_id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"

  dashboard:
    type: object
    required:
      - id
      - name
    x-display:
      table:
        - name:
            primary: true
            width: 200
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      name:
        type: string
        minLength: 1

  dashboard_widget:
    type: object
    required:
      - id
      - dashboard_id
      - name
      - entity_name
      - chart_type
      - group_by_field
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      dashboard_id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
        x-relationship:
          type: many-to-one
          target: dashboard
          labelField: name
      name:
        type: string
        minLength: 1
      entity_name:
        type: string
        minLength: 1
      chart_type:
        type: integer
        minimum: 0
        maximum: 3
        enum:
          - pie
          - column
          - bar
          - line
        default: 1
      stack_mode:
        type:
          - integer
          - "null"
        minimum: 0
        maximum: 2
        enum:
          - grouped
          - stacked
          - standardized
      series_field:
        type:
          - string
          - "null"
      group_by_bucket:
        type:
          - integer
          - "null"
        minimum: 0
        maximum: 4
        enum:
          - day
          - week
          - month
          - quarter
          - year
      group_by_field:
        type: string
        minLength: 1
      filter_field:
        type:
          - string
          - "null"
      filter_value:
        type:
          - string
          - "null"
      order:
        type: integer
        default: 0

  dashboard_detail:
    x-generate:
      list: true
      view: true
      new: true
      edit: true
      delete: true
      invalidate: false
      api: true
      test: true
    x-custom-components:
      - name: DashboardView
        path: "@/components/_standard/DashboardView"
        target:
          - view
    allOf:
      - $ref: "#/definitions/dashboard"
      - type: object
        required:
          - widgets
        properties:
          widgets:
            type: array
            items:
              $ref: "#/definitions/dashboard_widget"
