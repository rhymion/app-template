        - approver_role:
            width: 150
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      entity_name:
        type: string
        minLength: 1
        x-entity-select: true
      requestor_role_id:
        type: 
          - string
          - "null"
        pattern: "^c[a-z0-9]{24,}$"
        x-relationship:
          type: many-to-one
          target: role
          labelField: name
      approver_role_id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
        x-relationship:
          type: many-to-one
          target: role
          labelField: name

  approval_flow_detail:
    x-generate:
      list: true
      view: true
      new: true
      edit: true
      delete: true
      invalidate: false
      api: true
      test: true
    x-relationships:
      preceded_by:
        type: many-to-many
        target: approval_flow
        labelField: entity_name
        secondaryLabelField: approver_role.name
      followed_by:
        type: many-to-many
        target: approval_flow
        labelField: entity_name
        secondaryLabelField: approver_role.name
    allOf:
      - $ref: "#/definitions/approval_flow"
      - type: object
        required:
          - approver_role
          - preceding_transitions
        properties:
          requestor_role:
            $ref: "#/definitions/role"
          approver_role:
            $ref: "#/definitions/role"
          preceded_by:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/approval_flow"
          followed_by:
            type: array
            x-outputType: list
            items:
              $ref: "#/definitions/approval_flow"

  approval_request:
    type: object
    required:
      - id
      - approvable_id
      - approval_flow_id
    x-display:
      table:
        - approval_flow:
            width: 200
        - status:
            width: 100
    properties:
      id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
      approvable_id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
        x-relationship:
          type: many-to-one
          target: approvable
          labelField: id
      approval_flow_id:
        type: string
        pattern: "^c[a-z0-9]{24,}$"
        x-relationship:
          type: many-to-one
          target: approval_flow
          labelField: entity_name
      status:
        type: integer
        minimum: 0
        maximum: 2
        enum:
          - Pending
          - Approved
          - Rejected

  approvable:
    type: object
