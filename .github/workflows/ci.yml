name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Generate package-lock.json for npm cache
        run: npm install --package-lock-only
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - name: Install app-generator Node.js dependencies
        working-directory: app-generator
        run: npm install
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install app-generator Python dependencies
        working-directory: app-generator
        run: pip install -r requirements.txt
      - name: Generate code, start test database, push schema and build
        run: npm run test:e2e:build
      - name: Run API E2E tests
        run: npm run test:e2e:cy:start

